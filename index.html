<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--About Project-->
  <title>Music Player</title>
  <meta name="description" content="[Descrição-do-projeto]" />
  <meta name="author" content="[Seu-Nome]" />
   
  <meta name="keywords" content="[palavras-chave, separadas, por, vírgula]" />

  <!--Clickjacking Protection-->
  <meta http-equiv="X-Frame-Options" content="DENY">
  <!--Content Security Policy (CSP)-->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <!-- HSTS (somente se usar HTTPS, configurar no servidor) -->
  <!-- <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains"> -->

  <!--Favicon-->
  <link rel="shortcut icon" href="" type="image/x-icon" />
  <!--CSS-->
  <link rel="stylesheet" href="src/styles/style.css" type="text/css" />
  <!--Javascript-->
  <script rel="preload" type="module" src="dist/main.js" defer></script>
</head>

<body>
  <header role="header">
  </header>

  <main role="main">
    <!--card =====================================-->
    <div class="card">
      <h2 id="card__title">Nome da Música</h2>
      <p>Descrição da Música</p>
      
      <audio id="card__audio" src="src/assets/audio/music.mp3"></audio>

      <!--card progress-->
      <div class="card__progress-container">
        <div class="card__progress"></div>
      </div>

      <!--card time-->
      <div class="card__time">
        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
      </div>

      <!--card controls-->
      <div class="card__controls">
        <button class="card__btn-repeat btn">🔁</button>
        <button class="card__btn-prev btn">⏮</button>
        <button class="card__btn-play btn">▶</button>
        <button class="card__btn-next btn">⏭</button>
        
        <!--card volume-->
        <div class="card__volume">
          <label for="volume">🔊</label>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
    </div>

  <footer role="footer">
  </footer>
</body>

</html>
