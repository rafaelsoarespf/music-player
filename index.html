<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--About Project-->
  <title>Music Player</title>
  <meta name="description" content="[Descrição-do-projeto]" />
  <meta name="author" content="[Seu-Nome]" />
   
  <meta name="keywords" content="[palavras-chave, separadas, por, vírgula]" />

  <!--Clickjacking Protection-->
  <meta http-equiv="X-Frame-Options" content="DENY">
  <!--Content Security Policy (CSP)-->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <!-- HSTS (somente se usar HTTPS, configurar no servidor) -->
  <!-- <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains"> -->

  <!--Favicon-->
  <link rel="shortcut icon" href="" type="image/x-icon" />
  <!--Icons-->
  <link rel="stylesheet" href="src/assets/fonts/css/all.min.css">
  <!--CSS-->
  <link rel="stylesheet" href="src/styles/style.css" type="text/css" />
  <!--Javascript-->
  <script type="module" src="dist/main.js" defer></script>
</head>

<body>
  <header>
  </header>

  <main role="main">
    <!--card =====================================-->
    <div id="card" class="card" aria-label="Music player">
      <h2 id="card__title">Nome da Música</h2>
      <p id="card__author">Descrição da Música</p>

      <!--card image-->
      <img id="card__image" src="src/assets/image/image.png" alt="music image">
      <!--card sound wave-->
      <div id="card__sound-wave" class="card__sound-wave"></div>
      <!--card audio-->
      <audio id="card__audio" src="src/assets/audio/music.mp3" preload="metadata"></audio>
      
      <!--card progress-->
      <div class="card__progress-container">
        <div class="card__progress"></div>
      </div>

      <!--card time-->
      <div class="card__time">
        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
      </div>

      <!--card controls-->
      <div class="card__controls">
        <button style="opacity: 0; cursor: auto;"></button>
        <button class="card__btn-shuffle btn" aria-label="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
        <button class="card__btn-prev btn" aria-label="Prev"><i class="fa-solid fa-backward-step"></i></button>
        <button class="card__btn-play btn" aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
        <button class="card__btn-next btn" aria-label="Next"><i class="fa-solid fa-forward-step"></i></button>
        <button class="card__btn-repeat btn" aria-label="Repeat"><i class="fa-solid fa-repeat"></i></button>
        <!--card volume-->
        <div class="card__volume">
          <label for="volume"><i class="fa-solid fa-volume"></i></label>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
    </div>
    
    <div id="playlist" class="playlist"></div>

  </main>
  <footer>
  </footer>
</body>

</html>
